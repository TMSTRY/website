<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" fill="#080a0e"/>

  <!-- Outer circle -->
  <circle cx="32" cy="32" r="27" stroke="url(#grad)" stroke-width="1.5"/>

  <!-- Top tick -->
  <line x1="32" y1="5" x2="32" y2="11" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bottom tick -->
  <line x1="32" y1="53" x2="32" y2="59" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left tick -->
  <line x1="5" y1="32" x2="11" y2="32" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right tick -->
  <line x1="53" y1="32" x2="59" y2="32" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- T glyph — vertical stem -->
  <line x1="32" y1="20" x2="32" y2="46" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
  <!-- T glyph — horizontal bar -->
  <line x1="22" y1="26" x2="42" y2="26" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
  <!-- T glyph — left wing extension -->
  <line x1="17" y1="26" x2="22" y2="26" stroke="url(#grad)" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- T glyph — right wing extension -->
  <line x1="42" y1="26" x2="47" y2="26" stroke="url(#grad)" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4fc3f7"/>
      <stop offset="0.5" stop-color="#9c6aff"/>
      <stop offset="1" stop-color="#e040fb"/>
    </linearGradient>
  </defs>
</svg>
